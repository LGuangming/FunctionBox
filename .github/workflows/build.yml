name: Build and Release VSTO Add-in

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    env:
      CI_MANIFEST_KEY_FILE: ${{ github.workspace }}\ci-signing-cert.pfx
      CI_MANIFEST_KEY_PASSWORD: ${{ secrets.CERT_PASSWORD }}
      PUBLISH_DIR: ${{ github.workspace }}\artifacts\publish\

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore signing certificate from secret
        shell: pwsh
        run: |
          $certBase64 = "${{ secrets.CERT_BASE64 }}"
          if ([string]::IsNullOrWhiteSpace($certBase64)) {
            throw "缺少 GitHub Secret: CERT_BASE64"
          }

          $bytes = [Convert]::FromBase64String($certBase64)
          [IO.File]::WriteAllBytes("${env:CI_MANIFEST_KEY_FILE}", $bytes)

      - name: Import signing certificate into CurrentUser store
        shell: pwsh
        run: |
          $certPassword = "${{ secrets.CERT_PASSWORD }}"
          if ([string]::IsNullOrWhiteSpace($certPassword)) {
            throw "缺少 GitHub Secret: CERT_PASSWORD"
          }

          $securePassword = ConvertTo-SecureString -String $certPassword -AsPlainText -Force
          $importedCert = Import-PfxCertificate -FilePath "${env:CI_MANIFEST_KEY_FILE}" -CertStoreLocation Cert:\CurrentUser\My -Password $securePassword

          if ($null -eq $importedCert) {
            throw "证书导入失败。"
          }

          "CI_MANIFEST_CERT_THUMBPRINT=$($importedCert.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Restore NuGet packages
        run: nuget restore FunctionBox.sln

      - name: Build solution
        run: msbuild FunctionBox.sln /t:Build /p:Configuration=Release /p:Platform="Any CPU" /p:ManifestKeyFile= /p:ManifestCertificateThumbprint="${{ env.CI_MANIFEST_CERT_THUMBPRINT }}"

      - name: Publish VSTO package
        run: msbuild src\FunctionBox\FunctionBox.csproj /t:Publish /p:Configuration=Release /p:Platform=AnyCPU /p:PublishDir="${{ env.PUBLISH_DIR }}" /p:PublishUrl="${{ env.PUBLISH_DIR }}" /p:ManifestKeyFile= /p:ManifestCertificateThumbprint="${{ env.CI_MANIFEST_CERT_THUMBPRINT }}"

      - name: Ensure setup.exe exists
        shell: pwsh
        run: |
          $setup = Get-ChildItem -Path "${env:PUBLISH_DIR}" -Filter setup.exe -Recurse | Select-Object -First 1
          if ($null -eq $setup) {
            throw "发布目录中未找到 setup.exe，请检查 Publish 结果。"
          }

      - name: Zip publish output
        uses: thedoctor0/zip-release@0.7.6
        with:
          type: zip
          filename: FunctionBox.zip
          directory: ${{ env.PUBLISH_DIR }}
          path: .

      - name: Upload Asset To Current Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: ${{ env.PUBLISH_DIR }}\FunctionBox.zip
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup certificate
        if: always()
        shell: pwsh
        run: |
          $thumbprint = "${env:CI_MANIFEST_CERT_THUMBPRINT}"
          if (-not [string]::IsNullOrWhiteSpace($thumbprint)) {
            Get-ChildItem -Path Cert:\CurrentUser\My | Where-Object { $_.Thumbprint -eq $thumbprint } | Remove-Item -Force
          }

          if (Test-Path "${env:CI_MANIFEST_KEY_FILE}") {
            Remove-Item -LiteralPath "${env:CI_MANIFEST_KEY_FILE}" -Force
          }
