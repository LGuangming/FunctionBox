name: Build and Release VSTO Add-in

# 1. 触发条件：当你推送一个以 'v' 开头的标签（Tag）时，这个工作流就会被触发，例如 v1.0.0, v2.1.3
on:
  push:
    tags:
      - 'v*'

# 2. 授予工作流写入权限，以便它能够创建 Release 和上传文件
permissions:
  contents: write

jobs:
  build-and-release:
    # 必须在 Windows 环境下运行，因为 VSTO 项目依赖 Windows 和 MSBuild
    runs-on: windows-latest

    steps:
      # 第一步：将你的代码从 GitHub 下载到构建服务器上
      - name: Checkout code
        uses: actions/checkout@v4

      # 第二步：设置 .NET SDK 环境（请根据你项目实际使用的 .NET 版本修改此处）
      - name: Setup .NET
        uses: actions/setup-dotnet@v4


      # 第三步：导入你的代码签名证书（关键步骤！）
      - name: Import Code Signing Certificate
        shell: pwsh
        run: |
          # 从 GitHub Secrets 中读取 Base64 编码的证书和密码
          $pfx_cert_base64 = "${{ secrets.CERT_BASE64 }}"
          $pfx_password = "${{ secrets.CERT_PASSWORD }}"
          $pfx_path = "$env:TEMP\certificate.pfx"

          # 将 Base64 字符串还原为 .pfx 证书文件
          [IO.File]::WriteAllBytes($pfx_path, [Convert]::FromBase64String($pfx_cert_base64))
          $secure_pwd = ConvertTo-SecureString -String $pfx_password -Force -AsPlainText

          # 将证书导入到构建服务器的临时证书存储区
          Import-PfxCertificate -FilePath $pfx_path -CertStoreLocation Cert:\CurrentUser\My -Password $secure_pwd

      # 第四步：配置 MSBuild 环境
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # 第五步：还原 NuGet 包（如果项目引用了 NuGet 包）
      - name: Restore NuGet packages
        run: msbuild -t:restore

      # 第六步：正式构建你的解决方案（请将下方尖括号内的内容替换为你的 .sln 文件名）
      - name: Build solution
        run: msbuild FunctionBox.sln -p:Configuration=Release -p:Platform="Any CPU" -p:VisualStudioVersion=17.0

      # 第七步：将生成好的发布文件夹打包成 ZIP 压缩文件
      - name: Zip publish output
        uses: thedoctor0/zip-release@0.7.6
        with:
          type: 'zip'
          filename: 'FunctionBox-Addin-Release.zip'
          # 请将下方的路径替换为你的项目实际输出路径，例如 'YourVstoProject/bin/Release/'
          directory: '.'
          path: 'FunctionBox/bin/Release/'

      # 第八步：在 GitHub 上创建一个新的 Release，并把压缩包作为附件传上去
      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ./VSTO-Addin-Release.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
